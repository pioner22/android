<!doctype html>
<html lang="ru" class="app-frame-booting">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eaf5f0" />
    <meta name="application-name" content="Yagodka" />
    <meta name="yagodka-build-id" content="dev" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Yagodka" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-app-192.png" sizes="192x192" />
    <link rel="mask-icon" href="./icons/icon.svg" color="#0b0f14" />
    <title>Yagodka</title>
    <script defer src="/boot.js"></script>
  </head>
  <body>
    <div id="app" class="app-frame app-frame-booting">
      <div class="boot" aria-live="polite">
        <div class="boot-frame">
          <img class="boot-logo" src="./icons/icon.svg" alt="" />
          <div class="boot-kicker">Corporate Messenger</div>
          <div class="boot-brand">Yagodka</div>
          <div class="boot-sub" id="boot-status">Проверяем версию клиента</div>
          <div class="boot-version" id="boot-version" data-build-version="dev">Web dev</div>
          <div class="boot-bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <style>
      body {
        margin: 0;
        --app-host-canvas-bg: #eaf5f0;
        --app-frame-bg: var(--app-host-canvas-bg);
        --app-frame-safe-bg: var(--app-host-canvas-bg);
        --app-shell-bottom-spill: 0px;
        background: var(--app-frame-bg, var(--body-bg, var(--app-bg, #eaf5f0)));
        background-color: var(--app-host-canvas-bg);
        color: var(--app-text, #18211d);
        font:
          500 16px/1.35 ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }
      html.app-frame-booting,
      html.app-frame-booting body {
        --safe-area-bg: #eaf5f0;
        --app-host-canvas-bg: #eaf5f0;
        --app-frame-bg: #eaf5f0;
        --app-frame-safe-bg: #eaf5f0;
        background: #eaf5f0;
        background-color: #eaf5f0;
      }
      #app {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        bottom: auto;
        min-height: 0;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: var(--app-frame-bg, #eaf5f0);
        background-color: var(--app-host-canvas-bg);
        isolation: isolate;
      }
      .boot {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        padding: 24px;
        text-align: left;
        background: var(--app-frame-bg, #eaf5f0);
        background-color: var(--app-host-canvas-bg);
        z-index: 2;
        transition: opacity 180ms ease;
        will-change: opacity;
      }
      .boot.boot-out {
        opacity: 0;
        pointer-events: none;
      }
      .boot-frame {
        width: min(360px, calc(100vw - 48px));
        display: grid;
        gap: 10px;
        padding: 24px;
        border: 1px solid rgba(37, 52, 45, 0.12);
        border-radius: 8px;
        background: #fbfcfd;
        box-shadow: 0 24px 52px rgba(35, 48, 41, 0.14);
      }
      .boot-logo {
        width: 48px;
        height: 48px;
        opacity: 0.96;
      }
      .boot-kicker {
        margin-top: 6px;
        color: #66736d;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      .boot-brand {
        color: #18211d;
        font-weight: 800;
        letter-spacing: 0;
        font-size: 24px;
        line-height: 1.1;
      }
      .boot-sub {
        min-height: 20px;
        color: #66736d;
        font-size: 14px;
        line-height: 1.4;
      }
      .boot-version {
        color: #4f5f58;
        font-size: 12px;
        font-weight: 760;
        line-height: 1.3;
      }
      .boot-bar {
        width: 100%;
        height: 3px;
        margin-top: 4px;
        border-radius: 2px;
        background: linear-gradient(90deg, #2563eb 0 34%, rgba(148, 163, 184, 0.28) 34% 100%);
        position: relative;
      }
      @media (prefers-reduced-motion: reduce) {
        .boot {
          transition: none;
        }
      }
      @media (max-width: 420px) {
        .boot {
          padding: 16px;
        }
        .boot-frame {
          width: min(100%, calc(100vw - 32px));
          padding: 18px;
        }
      }
    </style>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
